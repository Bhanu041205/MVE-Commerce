spring:
  application:
    name: mvecommerce-backend
  datasource:
    # Overridden at startup when DATABASE_URL is set (DatabaseUrlNormalizer)
    url: jdbc:postgresql://ep-flat-unit-ai50sjq8-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_HzrORgZGC5U4}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 120000
      connection-timeout: 20000
      keepalive-time: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        # Let Hibernate auto-detect dialect - removes HHH90000025 warning
        # dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:6969}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:always}
    include-binding-errors: ${SERVER_ERROR_INCLUDE_BINDING_ERRORS:always}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mvecommerce_jwt_secret_key_for_authentication_and_token_generation_purposes_2026}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.mvecommerce: ${LOGGING_LEVEL_COM_MVECOMMERCE:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# CORS Configuration (Allow requests from any source)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  allowed-origin-patterns: "${CORS_ALLOWED_ORIGIN_PATTERNS:*}"
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH,HEAD}
  allowed-headers: "${CORS_ALLOWED_HEADERS:*}"
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}

# Optional notification config for customer order notes.
app:
  order-notes:
    # Comma-separated emails for admin/seller recipients.
    notify-recipients: ${APP_ORDER_NOTES_NOTIFY_RECIPIENTS:}
    # Sender used by notification emails.
    from-email: ${APP_ORDER_NOTES_FROM_EMAIL:no-reply@mvecommerce.local}
